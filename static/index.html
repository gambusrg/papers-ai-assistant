<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Papers Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; height: 100vh; background: #f4f4f5; }

    /* Sidebar */
    #sidebar {
      width: 280px; background: #1e1e2e; color: #cdd6f4;
      display: flex; flex-direction: column; padding: 20px; gap: 12px;
    }
    #sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #6c7086; }
    #papers-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .paper-item {
      padding: 10px 12px; background: #313244; border-radius: 8px;
      cursor: pointer; font-size: 13px; transition: background 0.2s;
    }
    .paper-item:hover { background: #45475a; }
    .paper-item.active { background: #89b4fa; color: #1e1e2e; font-weight: bold; }

    /* Chat area */
    #chat-area {
      flex: 1; display: flex; flex-direction: column;
    }
    #chat-header {
      padding: 16px 24px; background: white; border-bottom: 1px solid #e4e4e7;
      font-size: 15px; font-weight: 600; color: #18181b;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.user { align-self: flex-end; background: #89b4fa; color: #1e1e2e; }
    .message.assistant { align-self: flex-start; background: white; color: #18181b; border: 1px solid #e4e4e7; }
    .message.loading { color: #6c7086; font-style: italic; }

    #input-area {
      padding: 16px 24px; background: white; border-top: 1px solid #e4e4e7;
      display: flex; gap: 10px;
    }
    #input-area input {
      flex: 1; padding: 10px 14px; border: 1px solid #e4e4e7;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    #input-area input:focus { border-color: #89b4fa; }
    #input-area button {
      padding: 10px 20px; background: #89b4fa; color: #1e1e2e;
      border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

    #empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #6c7086; font-size: 15px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Añadir paper</h2>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <input id="paper-url" type="text" placeholder="URL del paper..."
      style="padding:8px 10px;border-radius:6px;border:none;font-size:13px;background:#313244;color:#cdd6f4;outline:none;" />
    <button id="add-paper-btn"
      style="padding:8px;background:#a6e3a1;color:#1e1e2e;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">
      Indexar
    </button>
    <div id="add-status" style="font-size:12px;color:#6c7086;min-height:16px;"></div>
  </div>
  <h2 style="margin-top:8px;">Papers</h2>
  <div id="papers-list">Cargando...</div>
</div>

<div id="chat-area">
  <div id="chat-header">Selecciona un paper para empezar</div>
  <div id="empty-state">← Selecciona un paper de la lista</div>
  <div id="messages" style="display:none"></div>
  <div id="input-area" style="display:none">
    <input id="query-input" type="text" placeholder="Escribe tu pregunta..." />
    <button id="send-btn">Enviar</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';
  let conversationId = null;
  let activePaperId = null;

  async function loadPapers() {
    const res = await fetch(`${API}/papers`);
    const papers = await res.json();
    console.log('Papers:', papers);
    const list = document.getElementById('papers-list');
    if (papers.length === 0) {
      list.innerHTML = '<div style="font-size:12px;color:#6c7086">No hay papers indexados</div>';
      return;
    }
    list.innerHTML = '';
    papers.forEach(p => {
      const el = document.createElement('div');
      el.className = 'paper-item';
      el.textContent = p.title;
      el.onclick = () => selectPaper(p.id, p.title, el);
      list.appendChild(el);
    });
  }

  async function selectPaper(paperId, title, el) {
    document.querySelectorAll('.paper-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    activePaperId = paperId;

    const res = await fetch(`${API}/conversation`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paper_id: paperId }),
    });
    const data = await res.json();
    conversationId = data.conversation_id;

    document.getElementById('chat-header').textContent = title;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
  }

  async function sendMessage() {
    const input = document.getElementById('query-input');
    const query = input.value.trim();
    if (!query || !conversationId) return;

    input.value = '';
    addMessage(query, 'user');

    const loading = addMessage('Pensando...', 'assistant loading');
    document.getElementById('send-btn').disabled = true;

    const res = await fetch(`${API}/conversation/${conversationId}/message`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json; charset=utf-8' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();

    loading.remove();
    addMessage(data.response, 'assistant');
    document.getElementById('send-btn').disabled = false;
  }

  function addMessage(text, type) {
    const el = document.createElement('div');
    el.className = `message ${type}`;
    el.textContent = text;
    const container = document.getElementById('messages');
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return el;
  }

  document.getElementById('send-btn').onclick = sendMessage;
  document.getElementById('query-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  document.getElementById('add-paper-btn').onclick = async () => {
    const url = document.getElementById('paper-url').value.trim();
    if (!url) return;
    const status = document.getElementById('add-status');
    const btn = document.getElementById('add-paper-btn');
    status.textContent = 'Indexando...';
    btn.disabled = true;

    const formData = new FormData();
    formData.append('source', url);

    const res = await fetch(`${API}/papers`, { method: 'POST', body: formData });
    if (res.ok) {
      status.textContent = '✓ Paper indexado';
      document.getElementById('paper-url').value = '';
      await loadPapers();
    } else {
      status.textContent = '✗ Error al indexar';
    }
    btn.disabled = false;
  };

  loadPapers();
</script>
</body>
</html>
